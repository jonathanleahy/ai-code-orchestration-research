<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f5f7fa;
      color: #333;
    }
    .header {
      background: #fff;
      border-bottom: 1px solid #e1e8ed;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 1.5rem; color: #1a73e8; }
    .container { display: flex; height: calc(100vh - 60px); }
    .sidebar {
      width: 350px;
      background: #fff;
      border-right: 1px solid #e1e8ed;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .search-box {
      padding: 1rem;
      border-bottom: 1px solid #e1e8ed;
    }
    .search-box input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      font-size: 0.9rem;
    }
    .search-box input:focus {
      outline: none;
      border-color: #1a73e8;
      box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.1);
    }
    .clients-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem;
    }
    .client-item {
      padding: 1rem;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.2s;
    }
    .client-item:hover { background: #f9f9f9; }
    .client-item.active { background: #e8f0fe; }
    .client-name { font-weight: 600; font-size: 0.95rem; }
    .client-company { font-size: 0.85rem; color: #666; }
    .client-status {
      display: inline-block;
      font-size: 0.75rem;
      padding: 0.25rem 0.5rem;
      border-radius: 3px;
      margin-top: 0.25rem;
    }
    .status-active { background: #c6f6d5; color: #22543d; }
    .status-prospect { background: #fed7d7; color: #742a2a; }
    .status-inactive { background: #edf2f7; color: #2d3748; }
    .main-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #fff;
    }
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
    }
    .no-selection {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #999;
      font-size: 1.2rem;
    }
    .profile-header {
      border-bottom: 1px solid #e1e8ed;
      padding-bottom: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .profile-header h2 { font-size: 1.8rem; margin-bottom: 0.5rem; }
    .profile-meta {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 1rem;
      margin-top: 1rem;
    }
    .meta-item { }
    .meta-label { font-size: 0.8rem; color: #666; text-transform: uppercase; }
    .meta-value { font-size: 0.95rem; margin-top: 0.25rem; }
    .tabs {
      display: flex;
      border-bottom: 2px solid #e1e8ed;
      margin-bottom: 1.5rem;
      gap: 2rem;
    }
    .tab {
      padding: 0.75rem 0;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
      font-weight: 500;
      color: #666;
    }
    .tab.active {
      color: #1a73e8;
      border-bottom-color: #1a73e8;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .section {
      margin-bottom: 2rem;
      padding: 1.5rem;
      background: #f9f9f9;
      border-radius: 6px;
    }
    .section h3 { margin-bottom: 1rem; font-size: 1.1rem; color: #333; }
    .activity-item {
      padding: 1rem;
      border-left: 3px solid #1a73e8;
      margin-bottom: 1rem;
      background: #fff;
      border-radius: 4px;
    }
    .activity-time { font-size: 0.8rem; color: #999; }
    .activity-type {
      display: inline-block;
      font-size: 0.75rem;
      padding: 0.25rem 0.5rem;
      background: #e8f0fe;
      color: #1a73e8;
      border-radius: 3px;
      margin-bottom: 0.5rem;
    }
    .activity-title { font-weight: 600; margin: 0.5rem 0; }
    .activity-desc { font-size: 0.9rem; color: #666; }
    .form-group {
      margin-bottom: 1rem;
      display: flex;
      flex-direction: column;
    }
    .form-group label {
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: #333;
    }
    .form-group input, .form-group select, .form-group textarea {
      padding: 0.75rem;
      border: 1px solid #d0d7de;
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.9rem;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none;
      border-color: #1a73e8;
      box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.1);
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #1a73e8;
      color: white;
    }
    .btn-primary:hover { background: #1557b0; }
    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }
    .btn-secondary:hover { background: #e0e0e0; }
    .invoice-table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 4px;
      overflow: hidden;
    }
    .invoice-table th {
      background: #f5f5f5;
      padding: 1rem;
      text-align: left;
      font-weight: 600;
      font-size: 0.85rem;
      border-bottom: 2px solid #e1e8ed;
    }
    .invoice-table td {
      padding: 1rem;
      border-bottom: 1px solid #f0f0f0;
    }
    .invoice-table tr:hover { background: #f9f9f9; }
    .invoice-status {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 3px;
      font-size: 0.8rem;
      font-weight: 500;
    }
    .status-draft { background: #f0f0f0; color: #333; }
    .status-sent { background: #e3f2fd; color: #1565c0; }
    .status-paid { background: #c8e6c9; color: #2e7d32; }
    .add-btn {
      margin-bottom: 1rem;
    }
    .error { color: #d32f2f; font-size: 0.9rem; margin-top: 0.25rem; }
    .success { color: #388e3c; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="header">
    <h1>CRM System</h1>
    <div id="headerInfo"></div>
  </div>

  <div class="container">
    <div class="sidebar">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search clients...">
      </div>
      <div class="clients-list" id="clientsList"></div>
    </div>

    <div class="main-panel">
      <div class="main-content" id="mainContent">
        <div class="no-selection">Select a client to view details</div>
      </div>
    </div>
  </div>

  <script>
    let currentClientId = null;
    let clients = [];
    let allActivities = {};
    let allInvoices = {};

    async function query(gql) {
      const response = await fetch('/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: gql })
      });
      const json = await response.json();
      if (json.errors) {
        console.error('GraphQL error:', json.errors);
        return null;
      }
      return json.data;
    }

    async function loadClients() {
      const gql = '{ clients { id name company status } }';
      const data = await query(gql);
      if (data) {
        clients = data.clients;
        renderClientsList();
      }
    }

    function renderClientsList() {
      const list = document.getElementById('clientsList');
      const search = document.getElementById('searchInput').value.toLowerCase();
      const filtered = clients.filter(c =>
        c.name.toLowerCase().includes(search) ||
        c.company.toLowerCase().includes(search)
      );

      list.innerHTML = filtered.map(c => {
        const statusClass = 'status-' + c.status.toLowerCase();
        const active = currentClientId === c.id ? 'active' : '';
        return '<div class="client-item ' + active + '" onclick="selectClient(' + "'" + c.id + "'" + ')">' +
          '<div class="client-name">' + c.name + '</div>' +
          '<div class="client-company">' + c.company + '</div>' +
          '<div class="client-status ' + statusClass + '">' + c.status + '</div>' +
          '</div>';
      }).join('');
    }

    async function selectClient(id) {
      currentClientId = id;
      renderClientsList();

      const gql = '{ client(id: "' + id + '") { id name company email phone status createdAt } }';
      const data = await query(gql);
      if (data && data.client) {
        await loadActivitiesForClient(id);
        await loadInvoicesForClient(id);
        renderClientProfile(data.client);
      }
    }

    async function loadActivitiesForClient(clientId) {
      const gql = '{ activities(clientID: "' + clientId + '") { id type title description timestamp } }';
      const data = await query(gql);
      if (data) {
        allActivities[clientId] = data.activities || [];
      }
    }

    async function loadInvoicesForClient(clientId) {
      const gql = '{ invoices(clientID: "' + clientId + '") { id number amount description status createdAt dueDate } }';
      const data = await query(gql);
      if (data) {
        allInvoices[clientId] = data.invoices || [];
      }
    }

    function renderClientProfile(client) {
      const content = document.getElementById('mainContent');
      const createdDate = new Date(client.createdAt).toLocaleDateString();

      content.innerHTML =
        '<div class="profile-header">' +
        '  <h2>' + client.name + '</h2>' +
        '  <div class="profile-meta">' +
        '    <div class="meta-item"><div class="meta-label">Company</div><div class="meta-value">' + client.company + '</div></div>' +
        '    <div class="meta-item"><div class="meta-label">Email</div><div class="meta-value">' + client.email + '</div></div>' +
        '    <div class="meta-item"><div class="meta-label">Phone</div><div class="meta-value">' + client.phone + '</div></div>' +
        '    <div class="meta-item"><div class="meta-label">Status</div><div class="meta-value">' + client.status + '</div></div>' +
        '  </div>' +
        '</div>' +
        '<div class="tabs">' +
        '  <div class="tab active" onclick="switchTab(this, ' + "'" + 'details' + "'" + ')">Details</div>' +
        '  <div class="tab" onclick="switchTab(this, ' + "'" + 'history' + "'" + ')">History & Activity</div>' +
        '  <div class="tab" onclick="switchTab(this, ' + "'" + 'billing' + "'" + ')">Billing</div>' +
        '</div>' +
        '<div id="details" class="tab-content active">' + renderDetailsTab(client) + '</div>' +
        '<div id="history" class="tab-content">' + renderHistoryTab(client.id) + '</div>' +
        '<div id="billing" class="tab-content">' + renderBillingTab(client.id) + '</div>';
    }

    function renderDetailsTab(client) {
      return '<div class="section">' +
        '<h3>Contact Information</h3>' +
        '<p><strong>Name:</strong> ' + client.name + '</p>' +
        '<p><strong>Company:</strong> ' + client.company + '</p>' +
        '<p><strong>Email:</strong> ' + client.email + '</p>' +
        '<p><strong>Phone:</strong> ' + client.phone + '</p>' +
        '<p><strong>Status:</strong> ' + client.status + '</p>' +
        '<p><strong>Created:</strong> ' + new Date(client.createdAt).toLocaleDateString() + '</p>' +
        '</div>';
    }

    function renderHistoryTab(clientId) {
      const activities = allActivities[clientId] || [];
      const activitiesHtml = activities.length > 0 ?
        activities.map(a => {
          const time = new Date(a.timestamp).toLocaleString();
          const typeClass = 'activity-type';
          return '<div class="activity-item">' +
            '<div class="activity-time">' + time + '</div>' +
            '<div class="' + typeClass + '">' + a.type + '</div>' +
            '<div class="activity-title">' + a.title + '</div>' +
            '<div class="activity-desc">' + a.description + '</div>' +
            '</div>';
        }).join('') :
        '<p>No activities yet</p>';

      return '<div class="section">' +
        '<h3>Activity Timeline</h3>' +
        activitiesHtml +
        '</div>' +
        '<div class="section">' +
        '<h3>Add Activity</h3>' +
        '<form onsubmit="submitActivity(event, ' + "'" + clientId + "'" + ')">' +
        '<div class="form-group">' +
        '<label>Activity Type</label>' +
        '<select id="actType" required><option value="">Select...</option><option value="EMAIL">Email</option><option value="CALL">Call</option><option value="MEETING">Meeting</option><option value="NOTE">Note</option></select>' +
        '</div>' +
        '<div class="form-group">' +
        '<label>Title</label>' +
        '<input type="text" id="actTitle" required>' +
        '</div>' +
        '<div class="form-group">' +
        '<label>Description</label>' +
        '<textarea id="actDesc" rows="3"></textarea>' +
        '</div>' +
        '<button type="submit" class="btn btn-primary">Add Activity</button>' +
        '<div id="actMessage"></div>' +
        '</form>' +
        '</div>';
    }

    function renderBillingTab(clientId) {
      const invoices = allInvoices[clientId] || [];
      const invoicesHtml = invoices.length > 0 ?
        '<table class="invoice-table">' +
        '<thead><tr><th>Number</th><th>Amount</th><th>Status</th><th>Due Date</th></tr></thead>' +
        '<tbody>' +
        invoices.map(i => {
          const statusClass = 'invoice-status status-' + i.status;
          const dueDate = new Date(i.dueDate).toLocaleDateString();
          return '<tr><td>' + i.number + '</td><td>' + i.amount.toFixed(2) + '</td><td><span class="' + statusClass + '">' + i.status + '</span></td><td>' + dueDate + '</td></tr>';
        }).join('') +
        '</tbody>' +
        '</table>' :
        '<p>No invoices yet</p>';

      return '<div class="section">' +
        '<h3>Invoices</h3>' +
        invoicesHtml +
        '</div>' +
        '<div class="section">' +
        '<h3>Create Invoice</h3>' +
        '<form onsubmit="submitInvoice(event, ' + "'" + clientId + "'" + ')">' +
        '<div class="form-row">' +
        '<div class="form-group">' +
        '<label>Invoice Number</label>' +
        '<input type="text" id="invNumber" required>' +
        '</div>' +
        '<div class="form-group">' +
        '<label>Amount</label>' +
        '<input type="number" id="invAmount" step="0.01" required>' +
        '</div>' +
        '</div>' +
        '<div class="form-group">' +
        '<label>Description</label>' +
        '<input type="text" id="invDesc" required>' +
        '</div>' +
        '<div class="form-group">' +
        '<label>Due Date</label>' +
        '<input type="date" id="invDueDate" required>' +
        '</div>' +
        '<button type="submit" class="btn btn-primary">Create Invoice</button>' +
        '<div id="invMessage"></div>' +
        '</form>' +
        '</div>';
    }

    function switchTab(tabEl, tabName) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      tabEl.classList.add('active');
      document.getElementById(tabName).classList.add('active');
    }

    async function submitActivity(e, clientId) {
      e.preventDefault();
      const type = document.getElementById('actType').value;
      const title = document.getElementById('actTitle').value;
      const desc = document.getElementById('actDesc').value;

      const gql = 'mutation { createActivity(clientID: "' + clientId + '" type: ' + type + ' title: "' + escapeString(title) + '" description: "' + escapeString(desc) + '") { id } }';
      const data = await query(gql);

      const msg = document.getElementById('actMessage');
      if (data && data.createActivity) {
        msg.innerHTML = '<div class="success">Activity added!</div>';
        document.getElementById('actType').value = '';
        document.getElementById('actTitle').value = '';
        document.getElementById('actDesc').value = '';
        setTimeout(() => { selectClient(clientId); }, 500);
      } else {
        msg.innerHTML = '<div class="error">Failed to add activity</div>';
      }
    }

    async function submitInvoice(e, clientId) {
      e.preventDefault();
      const num = document.getElementById('invNumber').value;
      const amt = document.getElementById('invAmount').value;
      const desc = document.getElementById('invDesc').value;
      const due = document.getElementById('invDueDate').value;

      const gql = 'mutation { createInvoice(clientID: "' + clientId + '" number: "' + escapeString(num) + '" amount: ' + amt + ' description: "' + escapeString(desc) + '" dueDate: "' + due + 'T00:00:00Z") { id } }';
      const data = await query(gql);

      const msg = document.getElementById('invMessage');
      if (data && data.createInvoice) {
        msg.innerHTML = '<div class="success">Invoice created!</div>';
        document.getElementById('invNumber').value = '';
        document.getElementById('invAmount').value = '';
        document.getElementById('invDesc').value = '';
        document.getElementById('invDueDate').value = '';
        setTimeout(() => { selectClient(clientId); }, 500);
      } else {
        msg.innerHTML = '<div class="error">Failed to create invoice</div>';
      }
    }

    function escapeString(s) {
      return s.replace(/\\/g, '\\\\').replace(/"/g, '\\"').replace(/\n/g, '\\n');
    }

    document.getElementById('searchInput').addEventListener('input', renderClientsList);
    loadClients();
  </script>
</body>
</html>
